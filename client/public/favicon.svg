<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Main Leather Patch Background (Walnut color) -->
  <rect width="100" height="100" rx="24" fill="#4A3228" />
  
  <!-- Outer Stitches (Terracotta color) -->
  <rect x="8" y="8" width="84" height="84" rx="16" fill="none" stroke="#C96A3D" stroke-width="3" stroke-dasharray="6 4" opacity="0.9" />
  
  <!-- TTI Monogram for The Tannery India (Ivory color) -->
  <text x="50" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#FAF7F2" text-anchor="middle" letter-spacing="-1">TTI</text>
</svg>